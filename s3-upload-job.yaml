apiVersion: batch/v1
kind: Job
metadata:
  name: s3-uploader-job
  namespace: default
  annotations:
    argocd.argoproj.io/hook: Sync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
spec:
  template:
    spec:
      restartPolicy: Never
      containers:
      - name: aws-cli
        image: amazon/aws-cli:latest
        env:
        - name: AWS_ACCESS_KEY_ID
          value: "test"
        - name: AWS_SECRET_ACCESS_KEY
          value: "test"
        - name: AWS_DEFAULT_REGION
          value: "us-east-1"
        command: ["/bin/sh", "-c"]
        args:
        - |
          set -e
          echo "--- Configurando AWS CLI para compatibilidad con LocalStack ---"
          aws configure set default.s3.request_checksum_calculation when_required
          aws configure set default.s3.response_checksum_validation when_required

          echo "--- Creando reporte interno en el Pod ---"
          echo "Reporte de telemetria generado a las $(date)" > /tmp/reporte.txt

          echo "--- Verificando/Creando Bucket S3 en LocalStack ---"
          aws --endpoint-url=http://localstack-service:4566 s3 mb s3://reportes-cluster || true

          echo "--- Subiendo archivo a S3 via DNS interno ---"
          aws --endpoint-url=http://localstack-service:4566 s3 cp /tmp/reporte.txt s3://reportes-cluster/reporte-$(date +%s).txt

          echo "--- Proceso completado con exito ---"